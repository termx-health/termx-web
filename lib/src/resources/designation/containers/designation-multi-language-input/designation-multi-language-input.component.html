<form #form="ngForm" class="m-language-input-group-wrapper">
  <m-form-control *ngFor="let lang of val | keys | apply: requiredFirst: requiredLangs" [mName]="lang" [mShowExplain]="false" style="display: flex">
    <nz-input-group class="m-language-input-group"
        [class.m-language-input-group-disabled]="disabled"
        [nzAddOnBefore]="lang | apply: langName: langs:currentLang"
        [nzSuffix]="suffixTemplate"
    >
      <m-input [name]="lang"
          [(ngModel)]="val[lang].value"
          (ngModelChange)="fireOnChange()"
          [placeholder]="'web.code-system-concept-version.designation.multi-language-input.placeholder'"
          [disabled]="disabled | toBoolean"
          required
      ></m-input>
    </nz-input-group>

    <ng-template #suffixTemplate>
      <m-button *ngIf="!disabled && !(lang | apply: isRequired: requiredLangs)" mDisplay="text" mShape="circle" mSize="small" (click)="removeLanguage(lang)">
        <m-icon mCode="close-circle"></m-icon>
      </m-button>
    </ng-template>

    <twl-value-set-concept-select
        name="designationModalStatus"
        [(ngModel)]="val[lang].status"
        valueSet="publication-status"
        required
    ></twl-value-set-concept-select>

    <m-button mDisplay="text" mShape="circle" (click)="val[lang].preferred? val[lang].preferred = !val[lang].preferred : val[lang].preferred = true">
      <m-icon [mOptions]="{nzTheme : val[lang].preferred? 'fill' : 'outline'}" [mCode]="'star'"></m-icon>
    </m-button>
  </m-form-control>

</form>

<m-dropdown *ngIf="!disabled && (langs | filter:isFree: val)?.length" class="m-language-input-dropdown">
  <m-button *m-dropdown-container mClass="m-language-input-dropdown-button">
    <span>{{'web.code-system-concept-version.designation.multi-language-input.add-translation' | translate}}</span>
    <m-icon mCode="down"></m-icon>
  </m-button>

  <ng-container *ngFor="let utl of (langs | filter:isFree: val)">
    <a *m-dropdown-item (click)="addLanguage(utl.code)">
      {{utl.names[currentLang]?.value}}
    </a>
  </ng-container>
</m-dropdown>
