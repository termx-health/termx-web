<m-button mClass="m-justify-between" [disabled]="disabled">
  @if (placement === 'left') {
    <m-icon [mCode]="icon" [mSize]="size" ></m-icon>
  }
  @if (isDesktop) {
    <ng-content></ng-content>
  }
  @if (placement === 'right') {
    <m-icon [mCode]="icon" [mSize]="size" ></m-icon>
  }
</m-button>
