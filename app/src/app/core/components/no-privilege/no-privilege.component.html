<h1 class="m-bold">{{'core.no-privilege.error' | translate}}</h1>

@if (privileges?.length < 2) {
  <div [innerHTML]="'core.no-privilege.privileges.singular' | translate: ({privilege: privileges})"></div>
}
@if (privileges?.length > 1) {
  <div [innerHTML]="'core.no-privilege.privileges.plural' | translate: ({privileges: privileges | join: '; '})"></div>
}
<div [innerHTML]="'core.no-privilege.access' | translate: ({path: router.url})"></div>
