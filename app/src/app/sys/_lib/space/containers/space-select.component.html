<m-select
  icon="search"
  placeholder="marina.ui.inputs.search.placeholder"
  name="value" [(ngModel)]="value"
  (mChange)="fireOnChange()"
  [loading]="loader.isLoading"
  [autoUnselect]="false"
  [filterOption]="filterOption"
  >
  @for (id of data | keys; track id) {
    <m-option [mValue]="data[id].id" mLabel="{{data[id].names | localName}}"/>
  }
</m-select>
