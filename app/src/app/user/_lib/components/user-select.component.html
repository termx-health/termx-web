<m-select icon="search" [placeholder]="placeholder" name="value" [(ngModel)]="value" (mChange)="fireOnChange()" [loading]="loader.isLoading" [autoUnselect]="false">
  @for (key of data | keys; track key) {
    <m-option [mValue]="data[key]?.sub" [mLabel]="data[key].name"></m-option>
  }
</m-select>
