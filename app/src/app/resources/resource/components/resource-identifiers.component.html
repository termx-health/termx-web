<m-card class="m-card-inside">
  <div *m-card-header class="m-justify-between">
    <div class="m-card__title">{{'entities.resource.identifiers.multiple' + (version ? '-version' : '') | translate}}</div>
    <m-dropdown>
      <tw-add-button *m-dropdown-container icon="down" placement="right">
        {{'web.resource.form.identifiers.often-used-identifiers' | translate}}
      </tw-add-button>
      <a *m-dropdown-item (click)="addOidIdentifier()">OID</a>
    </m-dropdown>
  </div>

  <form #form="ngForm" *ngIf="identifiers">
    <m-editable-table #rowsTable [mData]="identifiers" [mRowInstance]="rowInstance" required>
      <m-editable-column [mTitle]="'entities.resource.identifiers.system'" mName="system">
        <ng-template #viewTemplate let-i>{{i.system}}</ng-template>
        <ng-template #editTemplate let-i let-ngModelName="ngModelName">
          <m-input [name]="ngModelName" [(ngModel)]="i.system" (ngModelChange)="trimWhitespace(i, 'system')" required></m-input>
        </ng-template>
      </m-editable-column>
      <m-editable-column [mTitle]="'entities.resource.identifiers.value'" mName="value" required>
        <ng-template #viewTemplate let-i>{{i.value}}</ng-template>
        <ng-template #editTemplate let-i let-ngModelName="ngModelName">
          <m-input [name]="ngModelName" [(ngModel)]="i.value" (ngModelChange)="trimWhitespace(i, 'value')" required></m-input>
        </ng-template>
      </m-editable-column>
    </m-editable-table>
  </form>
</m-card>
