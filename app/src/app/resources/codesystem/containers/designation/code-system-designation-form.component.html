<form #form="ngForm" *ngIf="designation">
  <m-form-item mName="designationType" mLabel="entities.designation.type" required>
    <m-select name="designationType" [(ngModel)]="designation.designationTypeId" placeholder="marina.ui.inputs.search.placeholder" icon="search" required>
      <m-option *ngFor="let prop of entityProperties.data" [value]="prop.id" [label]="prop.name"></m-option>
    </m-select>
  </m-form-item>

  <m-form-item mName="designationName" mLabel="entities.designation.name" required>
    <m-input name="designationName" [(ngModel)]="designation.name" required></m-input>
  </m-form-item>

  <m-form-item mLabel="entities.designation.language">
    <twl-value-set-concept-select name="designationLanguage" [(ngModel)]="designation.language" valueSet="languages"></twl-value-set-concept-select>
  </m-form-item>

  <m-form-item mLabel="entities.designation.designation-kind">
    <m-select name="designationKind" [(ngModel)]="designation.designationKind">
      <m-option [label]="'text'" value="text"></m-option>
      <m-option [label]="'blob'" value="blob"></m-option>
    </m-select>
  </m-form-item>

  <m-form-item mName="designationCaseSignificance" mLabel="entities.designation.case-significance" required>
    <m-select name="designationCaseSignificance" [(ngModel)]="designation.caseSignificance" required>
      <m-option label="web.case-sensitive-options.ci" value="ci"></m-option>
      <m-option label="web.case-sensitive-options.cs" value="cs"></m-option>
      <m-option label="web.case-sensitive-options.ics" value="ics"></m-option>
    </m-select>
  </m-form-item>

  <m-form-item mLabel="entities.designation.description">
    <m-textarea name="designationDescription" [(ngModel)]="designation.description"></m-textarea>
  </m-form-item>

  <m-form-item mName="designationStatus" mLabel="entities.designation.status" required>
    <twl-value-set-concept-select name="designationStatus"
        [(ngModel)]="designation.status"
        valueSet="publication-status"
        required></twl-value-set-concept-select>
  </m-form-item>
</form>
