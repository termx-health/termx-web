<m-form-row>
  <div *mFormCol>
    <m-spinner [mLoading]="loading">
      <m-card *ngIf="supplement" [mTitle]="supplement.targetType | apply: getHeader:mode">
          <twa-code-system-property-form #form *ngIf="supplement.targetType === 'EntityProperty'" [property]="supplement.target"></twa-code-system-property-form>
          <twa-code-system-designation-form #form *ngIf="supplement.targetType === 'Designation'" [designation]="supplement.target" [codeSystemId]="codeSystemId"></twa-code-system-designation-form>
          <twa-code-system-property-value-form #form *ngIf="supplement.targetType === 'EntityPropertyValue'" [propertyValue]="supplement.target" [codeSystemId]="codeSystemId"></twa-code-system-property-value-form>
          <m-form-item mName="supplementDescription" mLabel="web.supplement.form.description">
            <m-textarea name="supplementDescription" [(ngModel)]="supplement.description"></m-textarea>
          </m-form-item>
        <ng-container *m-card-footer>
          <m-button mDisplay="primary"
              [mLoading]="loading"
              [disabled]="loading || !(['EntityProperty', 'Designation', 'EntityPropertyValue'] | includes: supplement.targetType)"
              (click)="save()"
          >
            {{'core.btn.save' | translate}}
          </m-button>
        </ng-container>
      </m-card>
    </m-spinner>
  </div>
</m-form-row>
