<m-form-row>
  <div *mFormCol>
    <m-spinner [mLoading]="loading">
      <m-card>
        <div *m-card-header style="display: flex">
          <div class="m-card-title">{{'web.code-system-version.form.view-header' | translate}}</div>
          <twa-status-tag *ngIf="version?.status" [status]="version.status" style="margin-left: 0.5em"></twa-status-tag>
        </div>
        <div *ngIf="version">
          <m-form-item mLabel="web.code-system-version.entity.version">
            {{version.version}}
          </m-form-item>

          <m-form-item mLabel="web.code-system-version.entity.source">
            {{version.source}}
          </m-form-item>

          <m-form-item mLabel="web.code-system-version.entity.preferred-language">
            {{version.preferredLanguage}}
          </m-form-item>

          <m-form-item mLabel="web.code-system-version.entity.supported-languages">
            {{version.supportedLanguages}}
          </m-form-item>

          <m-form-item mLabel="web.code-system-version.entity.description">
            {{version.description}}
          </m-form-item>

          <m-form-item mLabel="web.code-system-version.entity.release-date">
            {{version.releaseDate | localDate}}
          </m-form-item>

          <m-form-item mLabel="web.code-system-version.entity.expiration-date">
            {{version.expirationDate | localDate}}
          </m-form-item>
        </div>
      </m-card>
    </m-spinner>
  </div>
</m-form-row>
