<m-select icon="search"
  placeholder="marina.ui.inputs.search.placeholder"
  name="value" [(ngModel)]="value"
  (mChange)="fireOnChange()"
  [autoUnselect]="false"
  [autoSelect]="true"
  [loading]="isLoading">
  @for (key of data | keys; track key) {
    <m-option
      [mValue]="valueType === 'id' ? data[key]?.id : data[key]?.version"
      [mLabel]="data[key]?.version"
      [mLabelTemplate]="label">
      <ng-template #label>
        <div class="m-items-middle">
          <span>{{data[key]?.version}}</span>
          @if ((data[key]?.description | localName); as description) {
            <m-abbreviate [mLength]="40" [mThreshold]="10" mValue="({{description}})"/>
          }
        </div>
      </ng-template>
    </m-option>
  }
</m-select>
