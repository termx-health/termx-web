<m-select
  icon="select"
  placeholder="marina.ui.inputs.select.placeholder"
  name="value" [(ngModel)]="value"
  (mChange)="fireOnChange()"
  [loading]="isLoading"
  [multiple]="multiple"
  [autoUnselect]="false"
  >
  @for (key of data | keys; track key) {
    <m-option [mValue]="data[key]?.id" [mLabel]="data[key]?.name"></m-option>
  }
</m-select>
