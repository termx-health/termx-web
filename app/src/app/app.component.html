
<m-page-layout mTitle="web.app.header" [menu]="menu" (mLangChange)="onLangChange($event)">
    <a (click)="login()">Login</a>
    <p></p>
    <a (click)="logout()">Logout</a>
    <p>{{user | json}}</p>
  <ng-container *ngIf="!activeRoutePrivileges || (activeRoutePrivileges | apply:itHasAnyPrivilege); else accessError">
    <router-outlet></router-outlet>
  </ng-container>
  <ng-template #accessError>
    <twa-no-privilege [privileges]="activeRoutePrivileges"></twa-no-privilege>
  </ng-template>
</m-page-layout>
