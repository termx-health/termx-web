<m-select icon="search"
  placeholder="marina.ui.inputs.search.placeholder"
  name="value" [(ngModel)]="value"
  (mInputChange)="onSearch($event)"
  (mChange)="fireOnChange()"
  [loading]="isLoading"
  [autoUnselect]="false"
  [multiple]="multiple | toBoolean">
  @for (code of data | keys; track code) {
    <m-option [mValue]="code" mLabel="{{code}} - {{data[code].names | localName}}"></m-option>
  }
</m-select>
