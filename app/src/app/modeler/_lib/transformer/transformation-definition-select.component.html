<m-select
  icon="search"
  [placeholder]="placeholder"
  name="value" [(ngModel)]="value"
  (mInputChange)="onSearch($event)"
  (mChange)="fireOnChange()"
  [loading]="loader.isLoading"
  [autoUnselect]="false"
  >
  @for (key of data | keys; track key) {
    <m-option
      [mValue]="valueType === 'id' ? data[key]?.id : data[key]?.name"
      [mLabel]="data[key].name"
    ></m-option>
  }
</m-select>
