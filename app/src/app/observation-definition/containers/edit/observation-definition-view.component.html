<m-form-row>
  <div *mFormCol>
    <m-spinner [mLoading]="loader.isLoading">
      <m-card [mTitle]="'entities.observation-definition.observation-definition'" [mShowSkeleton]="loader.isLoading">
        @if (observationDefinition) {
          <form #form="ngForm">
            <m-form-item mLabel="entities.observation-definition.code">
              {{observationDefinition.code}}
            </m-form-item>
          </form>
        }
      </m-card>
    </m-spinner>
  </div>
</m-form-row>
