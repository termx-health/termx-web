<div style="display: flex; flex-direction: column; gap: 1rem">

  @for (group of conceptMap.group; track group; let i = $index) {
    <div>
      <p><b>Group {{i + 1}}</b> Mapping from <m-tag>{{group.source}}</m-tag> to <m-tag>{{group.target}}</m-tag></p>
      <m-table [mData]="group.element">
        <tr *mTableHead>
          <th>Source code</th>
          <th>Relationship</th>
          <th>Target code</th>
        </tr>
        <tr *mTableRow="let el">
          <td>{{el.code}}</td>
          <td>@for (t of el.target; track t) {
            <div>{{t.relationship}}</div>
          }</td>
          <td>@for (t of el.target; track t) {
            <div>{{t.code}}</div>
          }</td>
        </tr>
      </m-table>
    </div>
  }

</div>
