@if (mode === 'search') {
  <m-select
    icon="search"
    [placeholder]="placeholder"
    [(ngModel)]="value"
    (mInputChange)="onSearch($event)"
    (mChange)="fireOnChange()"
    [loading]="loader.isLoading"
    [autoUnselect]="false"
    [multiple]="multiple | toBoolean">
    @for (key of data | keys; track key) {
      <m-option [mValue]="data[key]?.code" [mLabel]="data[key] | apply:getCodeName"></m-option>
    }
    @if (!(data | keys | first)) {
      <m-option disabled mLabel="Start typing for value"></m-option>
    }
  </m-select>
}

@if (mode === 'select') {
  <m-select
    [placeholder]="placeholder"
    [(ngModel)]="value"
    (mChange)="fireOnChange()"
    [loading]="loader.isLoading"
    [autoUnselect]="false"
    [multiple]="multiple | toBoolean">
    @for (key of data | keys; track key) {
      <m-option [mValue]="data[key]?.code" [mLabel]="data[key] | apply:getCodeName"></m-option>
    }
  </m-select>
}
