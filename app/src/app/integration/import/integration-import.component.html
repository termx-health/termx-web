<m-card>
  <m-spinner [mLoading]=loading>
    <div *m-card-header class="m-justify-between">
      <nz-breadcrumb>
        @for (crumb of breadcrumbs; track crumb) {
          <nz-breadcrumb-item>{{crumb | translate: ({edition: edition})}}</nz-breadcrumb-item>
        }
      </nz-breadcrumb>
      <div class="m-justify-between">
        <m-button (click)="setDefaultData()" [disabled]="loading">{{'web.integration.set-default-data' | translate}}</m-button>
        <m-button mDisplay="primary"
          [disabled]="!data.sourceUrl || ! data.uri || !data.version || !data.validFrom || !data.codeSystem || !data.codeSystemName"
        (click)="import()">{{'web.integration.send-request' | translate}}</m-button>
      </div>
    </div>

    <m-form-item mLabel="web.integration.import.source-url" required>
      <m-input name="sourceUrl" [(ngModel)]="data.sourceUrl"></m-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.uri" required>
      <m-input name="uri" [(ngModel)]="data.uri"></m-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.publisher">
      <m-input name="publisher" [(ngModel)]="data.publisher"></m-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.version" required>
      <m-input name="version" [(ngModel)]="data.version"></m-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.valid-from" required>
      <m-date-picker name="validFrom" [(ngModel)]="data.validFrom"></m-date-picker>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.valid-to">
      <m-date-picker [(ngModel)]="data.validTo" name="validTo"></m-date-picker>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.code-system" required>
      <m-input name="codeSystem" [(ngModel)]="data.codeSystem"></m-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.base-code-system">
      <tw-code-system-search name="baseCodeSystem" [(ngModel)]="data.baseCodeSystem" valuePrimitive></tw-code-system-search>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.code-system-name" required>
      <m-multi-language-input name="codeSystemName" [(ngModel)]="data.codeSystemName"></m-multi-language-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.code-system-description">
      <m-multi-language-input [(ngModel)]="data.codeSystemDescription" name="codeSystemDescription"></m-multi-language-input>
    </m-form-item>
    <m-form-item mLabel="web.integration.import.code-system-version-description">
      <m-multi-language-input [(ngModel)]="data.codeSystemVersionDescription" name="codeSystemVersionDescription"></m-multi-language-input>
    </m-form-item>

  </m-spinner>
</m-card>
